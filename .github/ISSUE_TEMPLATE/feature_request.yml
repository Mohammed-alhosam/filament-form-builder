name: Feature request
description: Suggest an improvement for Filament Form Builder.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow are you trying to support?
      placeholder: Describe the practical need behind the feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, UI, or workflow you want to see.
      placeholder: Explain the ideal outcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches did you evaluate?
      placeholder: Optional.
